<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>אקורד ראשון</title>

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Rubik',sans-serif;
background:linear-gradient(135deg,#0a0a0a,#1a1a1a);
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
max-width:650px;
margin:auto;
padding:40px 20px;
animation:fadeIn 1.5s ease;
}

.logo{
width:220px;
margin-bottom:25px;
animation:float 4s ease-in-out infinite;
}

h1{
font-size:42px;
margin-bottom:10px;
color:#ff2a2a;
text-shadow:0 0 15px rgba(255,0,0,0.6);
}

.subtitle{
color:#aaa;
margin-bottom:40px;
font-size:18px;
}

.links{
display:flex;
flex-direction:column;
gap:16px;
}

.btn{
text-decoration:none;
background:#e11b1b;
padding:18px;
border-radius:14px;
font-size:20px;
font-weight:bold;
color:white;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
transition:0.3s;
box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

.btn:hover{
transform:scale(1.07);
background:#ff2a2a;
box-shadow:0 0 20px rgba(255,0,0,0.7);
}

footer{
margin-top:60px;
color:#777;
font-size:14px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="logo.png">

<h1>אקורד ראשון</h1>

<div class="subtitle">
עקבו אחרי בכל הרשתות 🎵
</div>

<div class="links">

<a class="btn" href="https://did.li/JGi6q" target="_blank">
🎵 טיקטוק
</a>

<a class="btn" href="https://did.li/h4cmC" target="_blank">
📸 אינסטגרם
</a>

<a class="btn" href="https://did.li/Pp8CN" target="_blank">
👍 פייסבוק
</a>

<a class="btn" href="https://did.li/7AzgT" target="_blank">
▶️ יוטיוב
</a>

<a class="btn" href="https://did.li/i4cmC" target="_blank">
💬 וואטסאפ
</a>

</div>

<footer>
© אקורד ראשון
</footer>

</div>

</body>
</html>
