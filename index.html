<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אקורד ראשון | קהילת המוזיקה של ישראל</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Rubik', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: white;
            text-align: center;
            overflow-x: hidden;
            /* הגלילה מופעלת כברירת מחדל */
            overflow-y: auto; 
        }

        /* מונע גלילה רק כשהמשחק פתוח */
        body.game-open {
            overflow: hidden;
        }

        .container {
            max-width: 650px;
            margin: auto;
            padding: 40px 20px;
            animation: fadeIn 1.5s ease;
        }

        .logo { width: 220px; margin-bottom: 25px; animation: float 4s ease-in-out infinite; max-width: 100%; }
        h1 { font-size: 42px; margin-bottom: 10px; color: #ff2a2a; text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }
        .subtitle { color: #aaa; margin-bottom: 40px; font-size: 18px; }

        .links { display: flex; flex-direction: column; gap: 16px; }

        .btn {
            text-decoration: none; background: #e11b1b; padding: 18px; border-radius: 14px;
            font-size: 20px; font-weight: bold; color: white; display: flex;
            align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5); border: none; cursor: pointer;
            width: 100%; box-sizing: border-box;
        }

        .btn:hover { transform: scale(1.02); background: #ff2a2a; }
        .btn-game { background: #e11b1b; }


        /* מסך המשחק */
        #gameOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 999; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
        }

        #gameCanvas { border: 4px solid #ff2a2a; background: #000; max-width: 100%; max-height: 40vh; }
        
        /* הודעת סיום */
        #endScreen {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95); border: 2px solid #ff2a2a; padding: 25px;
            border-radius: 20px; z-index: 1000; width: 85%; max-width: 320px;
            box-shadow: 0 0 50px rgba(255, 42, 42, 0.5);
        }

        .stats-container { margin-bottom: 15px; position: relative; width: 100%; max-width: 400px; }
        .high-score { color: #ffd700; font-size: 22px; font-weight: bold; }

        .controls { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; direction: ltr; }
        .control-btn { width: 55px; height: 55px; background: #333; border-radius: 10px; border: none; color: white; font-size: 24px; touch-action: manipulation; }

        .game-footer-btns { display: flex; gap: 10px; margin-top: 20px; width: 100%; max-width: 400px; }
        
        footer { margin-top: 60px; color: #777; font-size: 14px; padding-bottom: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0); } }

        @media (max-width: 480px) { .controls { display: grid; } }

        /* תוספת עיצוב יצירת קשר */
        .contact-trigger {
            position: fixed; bottom: 25px; right: 25px; background: #e11b1b;
            width: 55px; height: 55px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 26px;
            color: white; cursor: pointer; box-shadow: 0 0 20px rgba(225, 27, 27, 0.4);
            z-index: 1001; transition: 0.3s;
        }
        #contactModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 1002; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1a1a1a; padding: 30px; border-radius: 20px; width: 85%;
            max-width: 380px; border: 2px solid #ff2a2a; position: relative; text-align: right;
        }
        .close-modal { position: absolute; top: 15px; left: 15px; color: #777; font-size: 24px; cursor: pointer; }
        .contact-input {
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #333; background: #0a0a0a; color: white;
            box-sizing: border-box; font-family: 'Rubik', sans-serif; font-size: 16px;
        }
        textarea.contact-input { height: 120px; resize: none; }
    </style>
</head>

<body id="mainBody">

    <div class="container" id="mainPage">
        <img class="logo" src="logo.PNG">
        <h1>אקורד ראשון</h1>
        <div class="subtitle">קהילת המוזיקה של ישראל 🎵</div>

        <div class="links">
            <a class="btn" href="https://www.tiktok.com/@first_chord?_r=1&_t=ZS-94bPGKPtq1l" target="_blank">🎵 טיקטוק</a>
            <a class="btn" href="https://www.instagram.com/first_chord?igsh=YWtiem43cXBhMnVr&utm_source=qr" target="_blank">📸 אינסטגרם</a>
            <a class="btn" href="https://www.facebook.com/share/1GkQ8phhyr/?mibextid=wwXIfr" target="_blank">👍 פייסבוק</a>
            <a class="btn" href="https://youtube.com/@first_chord?si=DOU_n5thYuaH4vM-" target="_blank">▶️ יוטיוב</a>
            <a class="btn" href="https://whatsapp.com/channel/0029Vb6I5yh6GcGEigUMEu3J" target="_blank">💬 וואטסאפ</a>
            <button class="btn btn-game" onclick="openGame()">🐍 שחקו עם אקורד ראשון</button>
        </div>
        <footer>©️ אקורד ראשון</footer>
    </div>

    <div id="gameOverlay">
        <div class="stats-container">
            <button id="muteBtn" style="position: absolute; left: 10px; top: 0; background:none; border:none; color:white; font-size:24px; cursor:pointer;" onclick="toggleMute()">🔊</button>
            <div id="highScoreDisplay" class="high-score">שיא גינס: 0</div>
            <div id="currentScore" style="font-size: 18px; color: #fff;">ניקוד: 0</div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="endScreen">
            <h2 id="endStatus" style="color:#ff2a2a; margin-top:0; font-size: 24px;">המשחק נגמר</h2>
            <p id="finalScoreText" style="font-size: 18px; margin-bottom: 20px;">צברת 0 נקודות</p>
            
            <button class="btn" onclick="startNewGame()" style="padding:12px; font-size:16px; margin-bottom:10px;">🎮 משחק חדש</button>
            <button class="btn" id="shareWa" style="background:#25D366; padding:12px; font-size:16px; margin-bottom:10px;">📱 שתף בוואטסאפ</button>
            <button class="btn" onclick="closeGame()" style="background:#444; padding:12px; font-size:16px;">🏠 חזרה לבית</button>
        </div>

        <div class="controls">
            <div></div><button class="control-btn" onclick="changeDirection('UP')">▲</button><div></div>
            <button class="control-btn" onclick="changeDirection('LEFT')">◀</button>
            <button class="control-btn" onclick="changeDirection('DOWN')">▼</button>
            <button class="control-btn" onclick="changeDirection('RIGHT')">▶</button>
        </div>

        <div class="game-footer-btns">
            <button class="btn" style="background: #28a745; font-size: 16px;" onclick="finishGameManual()">🏁 סיום</button>
            <button class="btn" style="background: #444; font-size: 16px;" onclick="closeGame()">🏠 בית</button>
        </div>
    </div>

    <div class="contact-trigger" onclick="toggleContact(true)">📩</div>

    <div id="contactModal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleContact(false)">✕</span>
            <h2 style="color:#ff2a2a; margin-top:0; font-size: 24px;">דברו איתנו 🎸</h2>
            <form action="https://api.web3forms.com/submit" method="POST" onsubmit="setTimeout(() => { this.reset(); }, 500);">
                <input type="hidden" name="access_key" value="0fdc1bd6-cf3f-4957-aec6-d215479b4448">
                <input type="text" name="name" placeholder="שם מלא" class="contact-input" required>
                <input type="email" name="email" placeholder="אימייל לחזרה" class="contact-input" required>
                <textarea name="message" placeholder="איך אפשר לעזור?" class="contact-input" maxlength="2000" required></textarea>
                <button type="submit" class="btn" style="margin-top:10px; width: 100%;">שליחת פנייה</button>
            </form>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const music = document.getElementById("bgMusic");
        const grid = 20;
        let count = 0, score = 0, requestID;
        let particles = [];
        let gameActive = false;

        let highScore = localStorage.getItem("akordSnakeHS") || 0;
        document.getElementById("highScoreDisplay").innerText = "שיא גינס: " + highScore;

        let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: 320, y: 320 };
        const logoImg = new Image(); logoImg.src = 'logo.PNG';

        function createFirework(x, y) {
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x, y, dx: (Math.random() - 0.5) * 5, dy: (Math.random() - 0.5) * 5,
                    radius: Math.random() * 2, color: `hsl(${Math.random() * 360}, 100%, 60%)`, life: 35
                });
            }
        }

        function loop() {
            if (!gameActive) return;
            requestID = requestAnimationFrame(loop);
            if (++count < 7) { drawParticles(); return; }
            count = 0;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawParticles();

            snake.x += snake.dx; snake.y += snake.dy;
            if (snake.x < 0) snake.x = canvas.width - grid; else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - grid; else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            ctx.fillStyle = "white"; ctx.beginPath();
            ctx.arc(apple.x + grid/2, apple.y + grid/2, grid/1.5, 0, Math.PI * 2); ctx.fill();
            ctx.drawImage(logoImg, apple.x, apple.y, grid, grid);

            snake.cells.forEach((cell, index) => {
                ctx.fillStyle = index === 0 ? "white" : "#ff2a2a";
                ctx.fillRect(cell.x, cell.y, grid-1, grid-1);
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++; score++;
                    document.getElementById("currentScore").innerText = "ניקוד: " + score;
                    apple.x = Math.floor(Math.random() * 19) * grid;
                    apple.y = Math.floor(Math.random() * 19) * grid;
                }
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) endGame();
                }
            });
        }

        function drawParticles() {
            particles.forEach((p, i) => {
                p.x += p.dx; p.y += p.dy; p.life--;
                ctx.fillStyle = p.color; ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
        }

        function endGame() {
            gameActive = false;
            let statusText = "המשחק נגמר";
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("akordSnakeHS", highScore);
                document.getElementById("highScoreDisplay").innerText = "שיא גינס: " + highScore;
                statusText = "🏆 שיא גינס חדש!";
                for(let i=0; i<5; i++) setTimeout(() => createFirework(Math.random()*canvas.width, Math.random()*canvas.height), i*300);
            }
            
            document.getElementById("endStatus").innerText = statusText;
            document.getElementById("finalScoreText").innerText = "צברת " + score + " נקודות";
            document.getElementById("endScreen").style.display = "block";

            // עדכון לינק שיתוף
            document.getElementById("shareWa").onclick = () => {
                const text = encodeURIComponent(`שברתי את השיא במשחק של אקורד ראשון! צברתי ${score} נקודות 🎸 בואו נראה אם תצליחו לעקוף אותי: ${window.location.href}`);
                window.open(`https://wa.me/?text=${text}`, '_blank');
            };
        }

        function startNewGame() {
            score = 0;
            document.getElementById("currentScore").innerText = "ניקוד: 0";
            document.getElementById("endScreen").style.display = "none";
            snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
            particles = [];
            gameActive = true;
            requestAnimationFrame(loop);
        }

        function finishGameManual() { if (gameActive) endGame(); }

        function openGame() {
            document.getElementById("mainBody").classList.add("game-open");
            document.getElementById("mainPage").style.display = "none";
            document.getElementById("gameOverlay").style.display = "flex";
            music.play().catch(() => {});
            startNewGame();
        }

        function closeGame() {
            gameActive = false;
            cancelAnimationFrame(requestID);
            music.pause(); music.currentTime = 0;
            document.getElementById("mainBody").classList.remove("game-open");
            document.getElementById("endScreen").style.display = "none";
            document.getElementById("gameOverlay").style.display = "none";
            document.getElementById("mainPage").style.display = "block";
        }

        function changeDirection(dir) {
            if (!gameActive) return;
            if (dir === 'UP' && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
            else if (dir === 'DOWN' && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
            else if (dir === 'LEFT' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
            else if (dir === 'RIGHT' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
        }

        function toggleMute() {
            music.muted = !music.muted;
            document.getElementById("muteBtn").innerText = music.muted ? "🔇" : "🔊";
        }

        document.addEventListener('keydown', e => {
            if (e.which === 37) changeDirection('LEFT');
            if (e.which === 38) changeDirection('UP');
            if (e.which === 39) changeDirection('RIGHT');
            if (e.which === 40) changeDirection('DOWN');
        });

        // פונקציית פתיחת/סגירת יצירת קשר
        function toggleContact(show) {
            const modal = document.getElementById('contactModal');
            modal.style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
